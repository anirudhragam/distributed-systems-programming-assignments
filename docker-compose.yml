
services:
  product-db-0:
    build:
      context: .
      dockerfile: ./services/product-db/Dockerfile
    container_name: product_db_container_0
    ports:
      - "5432:5432"    # PostgreSQL port
      - "50051:50051"  # gRPC port
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
      SELF_IP: product-db-0
      PARTNERS: product-db-1,product-db-2,product-db-3,product-db-4
    volumes:
      - product_db_data_0:/var/lib/postgresql/data
      - product_db_raft_0:/data/raft
    networks:
      - distributed_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_user -d product_db && nc -z localhost 50051"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 5

